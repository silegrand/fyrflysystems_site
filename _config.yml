# _config.yml — Fyrfly Systems
# Jekyll configuration for GitHub Pages
# https://www.fyrflysystems.com

# ── Site ────────────────────────────────────────────────────
title: Fyrfly Systems
description: Intelligent physical security systems for schools and the public sector across the United Kingdom.
url: "https://www.fyrflysystems.com"
baseurl: ""

# ── Build ───────────────────────────────────────────────────
theme: null
plugins: []

# ── Exclude from Jekyll processing ──────────────────────────
exclude:
  - CITATION.cff
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

# ── Include ─────────────────────────────────────────────────
include:
  - .well-known

# ── Defaults ────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
    values:
      layout: null
