name: Discover Parish Council Sources

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run discovery script
        run: node scripts/discover-sources.mjs

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: discovery-report
          path: discovery-report.json
