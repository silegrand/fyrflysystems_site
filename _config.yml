# _config.yml — Fyrfly Systems
# Jekyll configuration for GitHub Pages
# https://www.fyrflysystems.com

# ── Site ────────────────────────────────────────────────────
title: Fyrfly Systems
description: Intelligent physical security systems for schools and the public sector across the United Kingdom.
url: "https://www.fyrflysystems.com"
baseurl: ""

# ── Build ───────────────────────────────────────────────────
# Serve all HTML files as-is — no Jekyll layouts or processing
theme: null
plugins: []

# ── Exclude from Jekyll processing ──────────────────────────
# These files are served as static assets or ignored entirely.
# Without this list, Jekyll may try to process them and fail.
exclude:
  - CITATION.cff
  - README.md
  - llms.txt
  - robots.txt
  - sitemap.xml
  - "*.js"
  - "*.json"
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

# ── Include ─────────────────────────────────────────────────
# Ensure dotfiles and well-known paths are served correctly
include:
  - .well-known

# ── Markdown ────────────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM

# ── Sass ────────────────────────────────────────────────────
# No Sass in use — disable processing to speed up builds
sass:
  style: compressed

# ── Defaults ────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
    values:
      layout: null

# ── Performance ─────────────────────────────────────────────
incremental: false
profile: false
