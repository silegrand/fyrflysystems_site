<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fyrfly CRM</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --c:#C8102E;--o:#E85D04;--a:#F5A623;
  --grad:linear-gradient(135deg,#C8102E 0%,#E85D04 52%,#F5A623 100%);
  --dark:#1C1F2E;--char:#252836;--panel:#2A2D3E;--card:#1E2130;
  --bdr:rgba(255,255,255,0.1);--bdr-s:rgba(255,255,255,0.16);
  --fh:'Roboto',sans-serif;--fb:'DM Sans',sans-serif;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--dark);color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:var(--fb);}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark);padding:2rem;position:relative;overflow:hidden;}
.login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 40%,rgba(232,93,4,0.12) 0%,transparent 55%),radial-gradient(ellipse at 20% 70%,rgba(200,16,46,0.08) 0%,transparent 50%);}
.login-wrap::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:36px 36px;}
.login-card{position:relative;z-index:2;background:var(--panel);border:1px solid var(--bdr-s);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
.login-mark{width:38px;height:38px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;}
.login-mark svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.login-name{font-family:var(--fh);font-size:17px;font-weight:700;color:#fff;}
.login-name span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-platform{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;}
.login-eyebrow{font-size:0.68rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--o);display:inline-flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem;}
.login-eyebrow::before{content:'';display:inline-block;width:14px;height:1.5px;background:var(--o);}
.login-title{font-family:var(--fh);font-size:1.5rem;font-weight:800;letter-spacing:-0.025em;margin-bottom:0.35rem;color:#fff;}
.login-sub{font-size:0.85rem;color:rgba(255,255,255,0.55);margin-bottom:1.75rem;line-height:1.6;}
.field-lbl{font-size:0.72rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:6px;display:block;}
.field-in{width:100%;padding:11px 14px;border:1px solid var(--bdr);border-radius:9px;background:rgba(255,255,255,0.07);color:#fff;font-size:14px;font-family:var(--fb);outline:none;transition:border-color 0.2s,background 0.2s;}
.field-in:focus{border-color:var(--o);background:rgba(232,93,4,0.08);}
.field-in::placeholder{color:rgba(255,255,255,0.22);}
.login-err{font-size:12px;color:#F87171;margin-top:0.5rem;}
.btn-grad{width:100%;padding:12px;border:none;border-radius:9px;background:var(--grad);color:#fff;font-family:var(--fh);font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:1rem;transition:opacity 0.2s,transform 0.2s var(--ease);}
.btn-grad:hover{opacity:0.88;transform:translateY(-1px);}

.app{display:grid;grid-template-columns:228px 1fr;min-height:100vh;}
.sidebar{background:var(--char);border-right:1px solid var(--bdr);display:flex;flex-direction:column;}
.sb-top{padding:1.25rem 1rem 1rem;border-bottom:1px solid var(--bdr);}
.sb-logo{display:flex;align-items:center;gap:9px;}
.sb-mark{width:30px;height:30px;border-radius:7px;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sb-name{font-family:var(--fh);font-size:14px;font-weight:700;color:#fff;}
.sb-name span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sb-tag{font-size:10px;color:rgba(255,255,255,0.28);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;}
.sb-section{font-size:9.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:1rem 1rem 0.3rem;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1rem;font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);cursor:pointer;transition:color 0.15s,background 0.15s;position:relative;}
.nav-item svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.nav-item:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.06);}
.nav-item.active{color:#fff;background:rgba(232,93,4,0.14);}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 3px 3px 0;background:var(--grad);}
.nav-item.active svg{stroke:var(--a);}
.sb-bottom{margin-top:auto;padding:1rem;border-top:1px solid var(--bdr);}
.sb-stats{background:rgba(255,255,255,0.05);border-radius:10px;padding:0.75rem;margin-bottom:0.75rem;border:1px solid var(--bdr);}
.sb-stat-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.sb-stat-row:last-child{margin-bottom:0;}
.sb-stat-label{color:rgba(255,255,255,0.38);}
.sb-stat-val{color:rgba(255,255,255,0.85);font-weight:600;font-family:var(--fh);}
.logout-btn{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(255,255,255,0.32);background:none;border:none;cursor:pointer;padding:4px 0;transition:color 0.15s;}
.logout-btn:hover{color:rgba(255,255,255,0.7);}
.logout-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.main{background:var(--dark);display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.75rem;border-bottom:1px solid var(--bdr);background:var(--char);flex-shrink:0;}
.page-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--o);margin-bottom:2px;}
.page-title{font-family:var(--fh);font-size:1.05rem;font-weight:700;letter-spacing:-0.015em;color:#fff;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn-action{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:opacity 0.18s,transform 0.18s var(--ease);}
.btn-action svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.btn-action.primary{background:var(--grad);color:#fff;}
.btn-action.primary:hover{opacity:0.88;transform:translateY(-1px);}
.btn-action.ghost{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.75);border:1px solid var(--bdr);}
.btn-action.ghost:hover{background:rgba(255,255,255,0.12);color:#fff;}
.content{padding:1.5rem 1.75rem;flex:1;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--panel);border:1px solid var(--bdr);border-radius:12px;padding:1.1rem 1.25rem;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:0.7;}
.stat-lbl{font-size:10.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.38);margin-bottom:6px;}
.stat-val{font-family:var(--fh);font-size:1.75rem;font-weight:900;letter-spacing:-0.03em;color:#fff;}
.stat-val.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-sub{font-size:11px;color:rgba(255,255,255,0.32);margin-top:3px;}
.filters{display:flex;gap:8px;margin-bottom:1.1rem;align-items:center;flex-wrap:wrap;}
.filter-in,.search-in{padding:7px 12px;font-size:12px;font-family:var(--fb);border:1px solid var(--bdr);border-radius:7px;background:rgba(255,255,255,0.07);color:#fff;outline:none;transition:border-color 0.2s;}
.filter-in:focus,.search-in:focus{border-color:var(--o);}
.filter-in option{background:var(--panel);}
.search-in{width:220px;}
.search-in::placeholder{color:rgba(255,255,255,0.22);}
.tbl-wrap{background:var(--panel);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 16px;text-align:left;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.3);border-bottom:1px solid var(--bdr);background:rgba(255,255,255,0.03);}
td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);vertical-align:middle;color:rgba(255,255,255,0.82);}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background 0.12s;}
tbody tr:hover td{background:rgba(255,255,255,0.05);cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;}
.b-lead{background:rgba(59,130,246,0.18);color:#93C5FD;}
.b-qualified{background:rgba(245,158,11,0.18);color:#FCD34D;}
.b-proposal{background:rgba(168,85,247,0.18);color:#D8B4FE;}
.b-negotiation{background:rgba(232,93,4,0.18);color:#FBA87A;}
.b-won{background:rgba(34,197,94,0.18);color:#86EFAC;}
.b-lost{background:rgba(239,68,68,0.18);color:#FCA5A5;}
.b-school{background:rgba(59,130,246,0.15);color:#93C5FD;}
.b-council{background:rgba(34,197,94,0.15);color:#86EFAC;}
.b-commercial{background:rgba(168,85,247,0.15);color:#D8B4FE;}
.b-nhs{background:rgba(244,63,94,0.15);color:#FDA4AF;}
.b-other{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.5);}
.av{width:30px;height:30px;border-radius:50%;background:rgba(232,93,4,0.18);border:1px solid rgba(232,93,4,0.3);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--a);font-family:var(--fh);flex-shrink:0;}
.av-lg{width:42px;height:42px;font-size:14px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(4px);}
.modal{background:var(--panel);border:1px solid var(--bdr-s);border-radius:16px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--bdr);}
.modal-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--o);margin-bottom:3px;}
.modal-title{font-family:var(--fh);font-size:15px;font-weight:700;color:#fff;}
.modal-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--bdr);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
.modal-close:hover{background:rgba(255,255,255,0.13);color:#fff;}
.modal-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.modal-body{padding:1.25rem 1.5rem;}
.modal-foot{padding:1rem 1.5rem;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;}
.fr{margin-bottom:1rem;}
.fr label{display:block;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.38);margin-bottom:6px;}
.fr input,.fr select,.fr textarea{width:100%;padding:10px 13px;border:1px solid var(--bdr);border-radius:8px;background:rgba(255,255,255,0.07);color:#fff;font-size:13px;font-family:var(--fb);outline:none;transition:border-color 0.2s,background 0.2s;}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--o);background:rgba(232,93,4,0.07);}
.fr input::placeholder,.fr textarea::placeholder{color:rgba(255,255,255,0.2);}
.fr select option{background:var(--panel);}
.fr textarea{resize:vertical;min-height:78px;line-height:1.5;}
.fr-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.seg-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
.seg-btn{padding:5px 13px;border-radius:100px;border:1px solid var(--bdr);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.seg-btn:hover{border-color:rgba(255,255,255,0.22);color:rgba(255,255,255,0.85);}
.seg-btn.active{background:rgba(232,93,4,0.18);border-color:var(--o);color:#fff;}
.detail-layout{display:grid;grid-template-columns:1fr 330px;gap:1.25rem;align-items:start;}
.detail-card{background:var(--panel);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;}
.detail-head{padding:1.25rem 1.5rem;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.detail-body{padding:1.25rem 1.5rem;}
.detail-sec-title{font-size:9.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:0.75rem;}
.detail-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px;font-size:13px;}
.detail-row-l{color:rgba(255,255,255,0.38);min-width:88px;flex-shrink:0;font-size:12px;}
.detail-row-v{color:rgba(255,255,255,0.82);}
.note-card{background:rgba(255,255,255,0.05);border:1px solid var(--bdr);border-radius:9px;padding:0.7rem 0.9rem;margin-bottom:7px;}
.note-meta{font-size:10.5px;color:rgba(255,255,255,0.28);margin-bottom:4px;}
.note-text{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.5;}
.note-add-row{display:flex;gap:8px;margin-top:0.75rem;}
.note-add-row textarea{flex:1;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;background:rgba(255,255,255,0.07);color:#fff;font-size:12px;resize:none;height:58px;outline:none;font-family:var(--fb);}
.note-add-row textarea:focus{border-color:var(--o);}
.note-add-row textarea::placeholder{color:rgba(255,255,255,0.2);}
.note-send{align-self:flex-end;width:36px;height:36px;border-radius:8px;border:none;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity 0.2s;}
.note-send:hover{opacity:0.85;}
.note-send svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.empty{padding:3.5rem 1rem;text-align:center;}
.empty-ico{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,0.05);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.empty-ico svg{width:24px;height:24px;stroke:rgba(255,255,255,0.22);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.empty p{font-size:13px;color:rgba(255,255,255,0.32);line-height:1.6;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.dash-card{background:var(--panel);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;}
.dash-card-head{padding:1rem 1.25rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.dash-card-title{font-family:var(--fh);font-size:13px;font-weight:700;color:#fff;}
.dash-card-count{font-size:11px;color:rgba(255,255,255,0.28);}
.recent-item{display:flex;align-items:center;gap:10px;padding:10px 1.25rem;border-bottom:1px solid rgba(255,255,255,0.05);}
.recent-item:last-child{border-bottom:none;}
.recent-name{font-size:13px;font-weight:500;color:#fff;flex:1;}
.recent-sub{font-size:11px;color:rgba(255,255,255,0.32);margin-top:1px;}
.pipeline-mini{padding:0.75rem 1.25rem;}
.pipe-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pipe-row:last-child{margin-bottom:0;}
.pipe-stage{font-size:12px;color:rgba(255,255,255,0.45);width:88px;flex-shrink:0;}
.pipe-bar-wrap{flex:1;height:6px;border-radius:100px;background:rgba(255,255,255,0.07);overflow:hidden;}
.pipe-bar{height:100%;border-radius:100px;background:var(--grad);}
.pipe-n{font-size:11px;font-family:var(--fh);font-weight:700;color:rgba(255,255,255,0.4);min-width:20px;text-align:right;}
.val-accent{color:var(--a);font-family:var(--fh);font-weight:700;}
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:rgba(255,255,255,0.28);font-size:13px;}
.setup-card{background:var(--panel);border:1px solid var(--bdr);border-radius:14px;padding:2rem;max-width:680px;}
.setup-eyebrow{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--o);margin-bottom:0.5rem;}
.setup-title{font-family:var(--fh);font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;color:#fff;}
.setup-sub{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:1.25rem;}
pre.sql{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:1.25rem;font-size:11px;overflow-x:auto;color:rgba(255,255,255,0.7);line-height:1.65;font-family:monospace;}
.setup-note{font-size:12px;color:rgba(255,255,255,0.28);margin-top:0.75rem;line-height:1.6;}

@media(max-width:900px){.app{grid-template-columns:1fr;}.sidebar{display:none;}.stats-row{grid-template-columns:1fr 1fr;}.dash-grid{grid-template-columns:1fr;}.detail-layout{grid-template-columns:1fr;}}
</style>
</head>

<script>
const {useState,useEffect}=React;
const SB='https://fyrrumltohkplldxwxdk.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5cnJ1bWx0b2hrcGxsZHh3eGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjM2MTgsImV4cCI6MjA5ODI5OTYxOH0.8kR3gojoLW8hgPDZD8eIMwEHUFMW52Qwu_90OsAh4KI';

}

const fmtD=d=>d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';
const fmtV=v=>v?'£'+Number(v).toLocaleString('en-GB'):'—';
function StageBadge({s}){const m={Lead:'b-lead',Qualified:'b-qualified',Proposal:'b-proposal',Negotiation:'b-negotiation',Won:'b-won',Lost:'b-lost'};return React.createElement('span',{className:`badge ${m[s]||'b-lead'}`},s);}
