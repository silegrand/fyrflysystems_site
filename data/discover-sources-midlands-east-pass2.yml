name: Parish Councils - Discover Sources (Midlands + East Pass 2)

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run second-pass discovery
        run: node scripts/discover-sources-midlands-east-pass2.mjs

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: discovery-report-midlands-east-pass2
          path: discovery-report-midlands-east-pass2.json
          retention-days: 30
